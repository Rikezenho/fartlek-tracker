<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fartlek Tracker</title>
    <link rel="manifest" href="manifest.json">
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        /* Ajuste fino para a barra de rolagem mobile */
        #blocksContainer::-webkit-scrollbar {
            width: 4px;
        }
        #blocksContainer::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans selection:bg-emerald-500 selection:text-white">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-10 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <input type="text" id="workoutName" value="Meu Treino Fartlek" 
                   class="bg-transparent border-b border-dashed border-gray-500 text-xl font-bold focus:outline-none focus:border-emerald-500 text-emerald-400 w-2/3"
                   placeholder="Nome do Treino">
            <span id="globalTimer" class="font-mono text-lg text-gray-400">00:00</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-md w-full mx-auto p-4 space-y-5 pb-28">
        
        <!-- Bloco Atual / Cronômetro Principal -->
        <div class="bg-gray-850 border border-gray-700 rounded-2xl p-6 text-center bg-gradient-to-b from-gray-800 to-gray-850 shadow-xl">
            <h2 id="currentBlockName" class="text-xs font-semibold uppercase tracking-widest text-emerald-400 mb-1">Preparado?</h2>
            <div id="blockTimer" class="text-6xl font-black font-mono my-2 text-white tracking-tight">00:00</div>
            <p id="currentBlockPace" class="text-sm text-gray-400 font-mono">Pace: --</p>
        </div>

        <!-- Lista de Blocos (Sequência) -->
        <div class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-sm font-bold uppercase tracking-wider text-gray-400">Blocos do Treino</h3>
                <button id="addBlockBtn" class="text-xs bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-1 px-3 rounded-full transition-all active:scale-95 shadow-sm">
                    + Adicionar Bloco
                </button>
            </div>
            
            <!-- Container dos blocos -->
            <div id="blocksContainer" class="space-y-3 max-h-[45vh] overflow-y-auto pr-1">
                <!-- Injetado via JS -->
            </div>
        </div>

        <!-- Seção de Importação / Exportação JSON -->
        <div class="pt-2 border-t border-gray-800 flex items-center justify-between gap-3">
            <button id="exportJsonBtn" class="flex-1 text-xs bg-gray-800 hover:bg-gray-750 text-gray-300 py-2.5 px-3 rounded-xl border border-gray-700 font-medium transition-all active:scale-95">
                📤 Exportar JSON
            </button>
            <label class="flex-1 text-xs bg-gray-800 hover:bg-gray-750 text-gray-300 py-2.5 px-3 rounded-xl border border-gray-700 font-medium transition-all active:scale-95 text-center cursor-pointer">
                📥 Importar JSON
                <input type="file" id="importJsonInput" accept=".json" class="hidden">
            </label>
        </div>

    </main>

    <!-- Botões de Controle Fixos na Base (Mobile-First) -->
    <div class="fixed bottom-0 left-0 right-0 bg-gray-800/95 backdrop-blur-md border-t border-gray-700 p-4 shadow-2xl z-20">
        <div class="max-w-md mx-auto grid grid-cols-3 gap-3 items-center">
            
            <!-- Botão de Reset Seguro -->
            <button id="resetBtn" class="bg-gray-700/50 hover:bg-red-950/40 text-gray-400 hover:text-red-400 font-medium py-3 px-2 rounded-xl transition-all border border-gray-650 active:scale-95 text-xs">
                Resetar
            </button>

            <!-- Botão Play/Pause Principal -->
            <button id="playPauseBtn" class="col-span-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-emerald-900/20 transition-all transform active:scale-95 flex justify-center items-center gap-2">
                <span id="playIcon">▶</span> Começar
            </button>

        </div>
    </div>

    <!-- Modal de Confirmação de Reset -->
    <div id="resetModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 max-w-xs w-full text-center shadow-2xl transform scale-95 transition-transform">
            <h3 class="text-lg font-bold text-white mb-2">Resetar Treino?</h3>
            <p class="text-gray-400 text-sm mb-5">Você perderá o progresso do treino atual.</p>
            <div class="grid grid-cols-2 gap-3">
                <button id="cancelReset" class="bg-gray-700 text-gray-300 font-medium py-2 rounded-xl text-sm active:scale-95">Voltar</button>
                <button id="confirmReset" class="bg-red-600 text-white font-bold py-2 rounded-xl text-sm active:scale-95 shadow-md shadow-red-900/20">Sim, Resetar</button>
            </div>
        </div>
    </div>

    <!-- Lógica do Aplicativo -->
    <script>
        // Estrutura de dados atualizada incluindo minPace, maxPace e isWalking por bloco
        let blocks = [
            { id: 1, name: 'Aquecimento', duration: 300, minPace: '06:30', maxPace: '06:00', isWalking: false },
            { id: 2, name: 'Tiro Rápido', duration: 60, minPace: '04:30', maxPace: '04:00', isWalking: false },
            { id: 3, name: 'Recuperação', duration: 120, minPace: '00:00', maxPace: '00:00', isWalking: true }
        ];
        
        let currentBlockIndex = 0;
        let isRunning = false;
        let globalTime = 0;
        let blockTimeLeft = blocks[0].duration;
        let timerInterval = null;
        let wakeLock = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const blocksContainer = document.getElementById('blocksContainer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resetModal = document.getElementById('resetModal');
        const confirmReset = document.getElementById('confirmReset');
        const cancelReset = document.getElementById('cancelReset');
        const workoutNameInput = document.getElementById('workoutName');
        const exportJsonBtn = document.getElementById('exportJsonBtn');
        const importJsonInput = document.getElementById('importJsonInput');

        // Renderizar Lista de Blocos com Configurações Individuais de Pace
        function renderBlocks() {
            blocksContainer.innerHTML = '';
            blocks.forEach((block, index) => {
                const isActive = index === currentBlockIndex && isRunning;
                const isPending = index > currentBlockIndex;
                
                const blockEl = document.createElement('div');
                blockEl.className = `p-3 rounded-xl border transition-all flex flex-col gap-2 ${
                    isActive 
                    ? 'bg-emerald-950/20 border-emerald-500/60 shadow-md ring-1 ring-emerald-500/30' 
                    : 'bg-gray-800/60 border-gray-700/80'
                } ${!isActive && !isPending ? 'opacity-45' : ''}`;

                blockEl.innerHTML = `
                    <!-- Linha Superior: Nome, Tempo e Delete -->
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <input type="text" value="${block.name}" onchange="updateBlock(${index}, 'name', this.value)"
                                   class="bg-transparent text-sm font-bold text-white focus:outline-none focus:border-emerald-500 w-full truncate">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="text" value="${formatTime(block.duration)}" onchange="updateBlockTime(${index}, this.value)"
                                   class="bg-gray-700/60 text-center text-xs font-mono font-bold text-emerald-400 rounded-lg px-2 py-1 w-14 focus:outline-none focus:ring-1 focus:ring-emerald-500">
                            <button onclick="deleteBlock(${index})" class="text-gray-500 hover:text-red-400 p-1 text-xs">✕</button>
                        </div>
                    </div>

                    <!-- Linha Inferior: Controles de Ritmo/Caminhada -->
                    <div class="flex items-center justify-between border-t border-gray-700/50 pt-2 text-xs">
                        <!-- Checkbox Caminhada -->
                        <label class="flex items-center gap-1.5 text-gray-400 cursor-pointer select-none">
                            <input type="checkbox" ${block.isWalking ? 'checked' : ''} 
                                   onchange="toggleWalking(${index}, this.checked)"
                                   class="w-3.5 h-3.5 rounded bg-gray-700 border-gray-600 text-emerald-500 focus:ring-0 focus:ring-offset-0">
                            <span>Caminhada</span>
                        </label>

                        <!-- Paces (Escondidos se for caminhada) -->
                        <div class="flex items-center gap-2 ${block.isWalking ? 'invisible' : ''}">
                            <div class="flex items-center gap-1">
                                <span class="text-gray-500 font-mono">Min:</span>
                                <input type="text" value="${block.minPace || '00:00'}" onchange="updateBlock(${index}, 'minPace', this.value)"
                                       class="bg-gray-700/30 text-center font-mono text-gray-300 rounded px-1 py-0.5 w-11 focus:outline-none focus:bg-gray-700">
                            </div>
                            <div class="flex items-center gap-1">
                                <span class="text-gray-500 font-mono">Max:</span>
                                <input type="text" value="${block.maxPace || '00:00'}" onchange="updateBlock(${index}, 'maxPace', this.value)"
                                       class="bg-gray-700/30 text-center font-mono text-gray-300 rounded px-1 py-0.5 w-11 focus:outline-none focus:bg-gray-700">
                            </div>
                        </div>
                    </div>
                `;
                blocksContainer.appendChild(blockEl);
            });
        }

        function updateBlock(index, field, value) {
            blocks[index][field] = value;
        }

        function toggleWalking(index, isChecked) {
            blocks[index].isWalking = isChecked;
            if (index === currentBlockIndex) updateDisplay();
            renderBlocks();
        }

        function updateBlockTime(index, timeStr) {
            const parts = timeStr.split(':');
            if(parts.length === 2) {
                const secs = (parseInt(parts[0]) * 60) + parseInt(parts[1]);
                if(!isNaN(secs)) {
                    blocks[index].duration = secs;
                    if(index === currentBlockIndex) blockTimeLeft = secs;
                    updateDisplay();
                }
            }
        }

        function deleteBlock(index) {
            if(blocks.length > 1) {
                blocks.splice(index, 1);
                if(currentBlockIndex >= blocks.length) currentBlockIndex = blocks.length - 1;
                resetTracker(false);
                renderBlocks();
            }
        }

        document.getElementById('addBlockBtn').addEventListener('click', () => {
            blocks.push({ id: Date.now(), name: 'Novo Bloco', duration: 60, minPace: '05:30', maxPace: '05:00', isWalking: false });
            renderBlocks();
        });

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateDisplay() {
            document.getElementById('globalTimer').innerText = formatTime(globalTime);
            document.getElementById('blockTimer').innerText = formatTime(blockTimeLeft);
            
            const currentBlock = blocks[currentBlockIndex];
            if(currentBlock) {
                document.getElementById('currentBlockName').innerText = currentBlock.name;
                
                if (currentBlock.isWalking) {
                    document.getElementById('currentBlockPace').innerText = `Ritmo Livre (Caminhada)`;
                } else {
                    document.getElementById('currentBlockPace').innerText = `Pace: ${currentBlock.minPace} - ${currentBlock.maxPace}`;
                }
            }
        }

        // --- IMPORTAÇÃO E EXPORTAÇÃO JSON ---
        exportJsonBtn.addEventListener('click', () => {
            const workoutData = {
                name: workoutNameInput.value,
                blocks: blocks
            };
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(workoutData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `${workoutData.name.toLowerCase().replace(/\s+/g, '-') || 'treino'}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        importJsonInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const parsedData = JSON.parse(event.target.result);
                    if (parsedData.blocks && Array.isArray(parsedData.blocks)) {
                        workoutNameInput.value = parsedData.name || "Treino Importado";
                        // Garante compatibilidade/sanitização de dados importados obsoletos ou novos
                        blocks = parsedData.blocks.map(b => ({
                            id: b.id || Date.now(),
                            name: b.name || 'Bloco',
                            duration: b.duration || 60,
                            minPace: b.minPace || '00:00',
                            maxPace: b.maxPace || '00:00',
                            isWalking: !!b.isWalking
                        }));
                        
                        resetTracker(true);
                        alert("Treino importado com sucesso!");
                    } else {
                        alert("Arquivo JSON inválido.");
                    }
                } catch (err) {
                    alert("Erro ao ler o arquivo JSON.");
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        // --- COORDENAÇÃO DE ÁUDIO & WAKE LOCK ---
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.warn(`Wake Lock falhou: ${err.message}`);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        function playBeep(type = 'short') {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'long') {
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.8);
            } else {
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function startTimer() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            requestWakeLock();

            timerInterval = setInterval(() => {
                globalTime++;
                blockTimeLeft--;

                if (blockTimeLeft <= 3 && blockTimeLeft > 0) {
                    playBeep('short');
                }

                if (blockTimeLeft <= 0) {
                    playBeep('long');
                    currentBlockIndex++;
                    
                    if (currentBlockIndex < blocks.length) {
                        blockTimeLeft = blocks[currentBlockIndex].duration;
                        renderBlocks();
                    } else {
                        clearInterval(timerInterval);
                        isRunning = false;
                        releaseWakeLock();
                        alert('Treino concluído com sucesso!');
                        resetTracker(false);
                        return;
                    }
                }
                updateDisplay();
            }, 1000);
        }

        playPauseBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                playPauseBtn.innerHTML = `<span>▶</span> Continuar`;
                playPauseBtn.className = playPauseBtn.className.replace('bg-amber-600', 'bg-emerald-600').replace('hover:bg-amber-500', 'hover:bg-emerald-500');
                releaseWakeLock();
            } else {
                isRunning = true;
                playPauseBtn.innerHTML = `<span>⏸</span> Pausar`;
                playPauseBtn.className = playPauseBtn.className.replace('bg-emerald-600', 'bg-amber-600').replace('hover:bg-emerald-500', 'hover:bg-amber-500');
                startTimer();
                renderBlocks();
            }
        });

        resetBtn.addEventListener('click', () => {
            resetModal.classList.remove('hidden');
        });

        cancelReset.addEventListener('click', () => {
            resetModal.classList.add('hidden');
        });

        confirmReset.addEventListener('click', () => {
            resetTracker(true);
            resetModal.classList.add('hidden');
        });

        function resetTracker(fullReset = true) {
            clearInterval(timerInterval);
            isRunning = false;
            releaseWakeLock();
            if(fullReset) {
                globalTime = 0;
                currentBlockIndex = 0;
            }
            blockTimeLeft = blocks[currentBlockIndex] ? blocks[currentBlockIndex].duration : 0;
            
            playPauseBtn.innerHTML = `<span>▶</span> Começar`;
            playPauseBtn.className = "col-span-2 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center gap-2";
            
            updateDisplay();
            renderBlocks();
        }

        // Inicialização
        renderBlocks();
        updateDisplay();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
